name: static

on:
  push:
    branches:
      - master
      - stable
  pull_request:
    branches:
      - master
      - stable

jobs:
  static_test:
    name: Static plugin (Go ${{ matrix.go }}, OS ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        go: [stable]
        os: [ubuntu-latest]
    steps:
      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v6 # action page: <https://github.com/actions/setup-go>
        with:
          go-version: ${{ matrix.go }}

      - name: Check out code
        uses: actions/checkout@v6

      - name: Init Go modules Cache # Docs: <https://git.io/JfAKn#go---modules>
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Install Go dependencies
        run: go mod download

      - name: Run root tests with coverage
        run: |
          mkdir -p ./coverage-ci

          go test -timeout 10m -v -race -cover -failfast \
            -coverpkg=github.com/roadrunner-server/static/v6/... \
            -coverprofile=./coverage-ci/root.out \
            -covermode=atomic ./...

      - name: Run integration tests with coverage
        run: |
          cd tests

          go test -timeout 10m -v -race -cover -failfast \
            -coverpkg=github.com/roadrunner-server/static/v6/... \
            -coverprofile=../coverage-ci/integration.out \
            -covermode=atomic ./...

      - name: Archive code coverage results
        uses: actions/upload-artifact@v7
        with:
          name: coverage-static
          path: ./coverage-ci

  codecov:
    name: Upload codecov
    runs-on: ubuntu-latest
    needs:
      - static_test
    timeout-minutes: 60
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Download code coverage results
        uses: actions/download-artifact@v8
        with:
          name: coverage-static
          path: coverage

      - run: |
          echo 'mode: atomic' > summary.txt
          tail -q -n +2 coverage/*.out >> summary.txt
          awk '
            NR == 1 { print; next }
            /^github\.com\/roadrunner-server\/static\/v6\// {
              sub(/^github\.com\/roadrunner-server\/static\/v6\//, "", $0)
              print
            }
          ' summary.txt > summary.filtered.txt
          mv summary.filtered.txt summary.txt

      - name: Upload to codecov
        uses: codecov/codecov-action@v5 # Docs: <https://github.com/codecov/codecov-action>
        with:
          files: summary.txt
          fail_ci_if_error: false
